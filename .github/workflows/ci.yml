name: CI

on:
  push:
    branches: [staging, new-prod]
  pull_request:
    branches: [staging, new-prod]

jobs:
  # ── Backend: Django checks + tests + safety ──
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: teaching_panel
    env:
      SECRET_KEY: "ci-secret-key-please-change-1234567890-abcdefghijklmnopqrstuvwxyz"
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      SECURE_SSL_REDIRECT: "True"
      SESSION_COOKIE_SECURE: "True"
      CSRF_COOKIE_SECURE: "True"
      SECURE_HSTS_SECONDS: "60"
      SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
      SECURE_HSTS_PRELOAD: "True"
      RECAPTCHA_ENABLED: "False"
      RECAPTCHA_PUBLIC_KEY: "disabled"
      RECAPTCHA_PRIVATE_KEY: "disabled"
      USE_IN_MEMORY_CELERY: "1"
      ZOOM_ACCOUNT_ID: "disabled"
      ZOOM_CLIENT_ID: "disabled"
      ZOOM_CLIENT_SECRET: "disabled"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: teaching_panel/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django checks
        run: |
          python manage.py check
          python manage.py check --deploy --fail-level WARNING

      # ── НОВОЕ: Запуск тестов ──
      - name: Run tests
        run: python manage.py test --verbosity=2 --parallel
        continue-on-error: false

      # ── НОВОЕ: Проверка миграций ──
      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      # ── НОВОЕ: Опасные миграции ──
      - name: Check dangerous migrations
        run: |
          echo "Checking for dangerous migration operations..."
          DANGEROUS=$(grep -rn "RemoveField\|DeleteModel\|RunSQL.*DROP\|RunSQL.*DELETE\|RunSQL.*TRUNCATE" */migrations/*.py 2>/dev/null | grep -v "__pycache__" || true)
          if [ -n "$DANGEROUS" ]; then
            echo "::warning::Dangerous migration operations found:"
            echo "$DANGEROUS"
          fi

  # ── НОВОЕ: Блокировка запрещённого кода ──
  safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block tenant code (BANNED FOREVER)
        run: |
          echo "Checking for banned tenant code..."
          TENANT_FILES=$(find teaching_panel/ -name "*.py" -not -path "*/__pycache__/*" -not -path "*/migrations/*" | xargs grep -l "from tenants\|import tenants\|TenantMiddleware\|TenantModelMixin\|TenantViewSetMixin\|set_current_tenant" 2>/dev/null || true)
          if [ -n "$TENANT_FILES" ]; then
            echo "::error::TENANT CODE DETECTED! This is BANNED forever (broke production 2026-02-08)"
            echo "$TENANT_FILES"
            exit 1
          fi
          echo "No tenant code found. OK."

      - name: Block emoji in frontend
        run: |
          echo "Checking for emoji in React components..."
          EMOJI=$(grep -rn '[😀-🧿🌀-🗿🚀-🛿☀-⭕✂-➰🇦-🇿]' frontend/src/components/ frontend/src/modules/ frontend/src/shared/ 2>/dev/null || true)
          if [ -n "$EMOJI" ]; then
            echo "::warning::Emoji found in UI components (use lucide-react icons instead):"
            echo "$EMOJI"
          fi

      - name: Check production-banned features
        run: |
          echo "Checking for production-banned feature flags in code..."
          BANNED=$(grep -rn "KNOWLEDGE_MAP_ENABLED.*=.*1\|SUPPORT_V2_ENABLED.*=.*1" teaching_panel/teaching_panel/settings.py 2>/dev/null | grep -v "environ\|os.environ\|#" || true)
          if [ -n "$BANNED" ]; then
            echo "::error::Production-banned feature enabled in settings.py:"
            echo "$BANNED"
            exit 1
          fi

  # ── Frontend ──
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false

      # ── НОВОЕ: Размер бандла ──
      - name: Check bundle size
        run: |
          MAIN_JS=$(find build/static/js -name "main.*.js" -not -name "*.map" | head -1)
          if [ -n "$MAIN_JS" ]; then
            SIZE=$(wc -c < "$MAIN_JS")
            SIZE_KB=$((SIZE / 1024))
            echo "Main bundle: ${SIZE_KB} KB"
            if [ "$SIZE_KB" -gt 512 ]; then
              echo "::warning::Main bundle is ${SIZE_KB} KB (threshold: 512 KB)"
            fi
          fi
